name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - master
  repository_dispatch:
    types:
      - microcms_build
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SERVICE_DOMAIN: ${{ secrets.SERVICE_DOMAIN }}
          API_KEY: ${{ secrets.API_KEY }}
          CI: "true"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name portfolio-v2 --branch master
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
